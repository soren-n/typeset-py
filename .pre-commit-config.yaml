# Pre-commit hooks for typeset-py
# Install with: pip install pre-commit && pre-commit install

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Rust formatting
  - repo: local
    hooks:
      - id: fmt
        name: Rust formatting (cargo fmt)
        description: Format Rust code with cargo fmt
        entry: cargo fmt --all
        language: system
        files: \.rs$
        pass_filenames: false

  # NOTE: cargo clippy / test / audit are intentionally NOT pre-commit hooks.
  # They are enforced by the dedicated "Rust Quality Checks" job in
  # .github/workflows/quality.yml. Running them under pre-commit caused
  # spurious failures: semantic-release bumps Cargo.toml on every push
  # without updating Cargo.lock, so cargo would regenerate the lock and
  # pre-commit fails any hook that modifies a tracked file.

  # Python type checking for .pyi files
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        name: Python type checking (mypy)
        description: Type check Python stub files
        files: \.pyi$
        args: [--strict, --ignore-missing-imports]

  # TOML formatting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-toml
        args: [--autofix]
        exclude: Cargo\.lock

  # Spell checking for documentation
  - repo: https://github.com/crate-ci/typos
    rev: v1.29.0
    hooks:
      - id: typos
        name: Spell checking
        description: Check for typos in documentation
        files: \.(md|txt|rst)$

  # Conventional commit format checking
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]
